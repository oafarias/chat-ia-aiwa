{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat AIWA</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 400px; background: #fff; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; height: 80vh; }
        .cabecalho { background: #007bff; color: white; padding: 15px; text-align: center; margin: 0; font-size: 1.2rem; }
        .mensagens { flex: 1; padding: 15px; overflow-y: auto; background: #fafafa; }
        .input-area { display: flex; padding: 10px; border-top: 1px solid #ddd; background: #fff; }
        .input-area input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; margin-right: 10px; outline: none; }
        .input-area button { padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2 class="cabecalho">Chat AIWA</h2>
        <div class="mensagens">
            <p style="color: #888; text-align: center; font-size: 0.9em; margin-top: 50%;">Inicie a conversa...</p>
        </div>
        <div class="input-area">
            <input type="text" placeholder="Digite sua mensagem...">
            <button>Enviar</button>
        </div>
    </div>
</body>
</html>
